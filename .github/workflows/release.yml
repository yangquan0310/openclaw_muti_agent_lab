name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Verify syntax
        run: node --check src/index.js

      - name: Pack
        run: npm pack

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: openclaw-agent-self-development-*.tgz
          generate_release_notes: true
